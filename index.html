<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUNGSTONEROLIC</title>
    <style>
        /* ตั้งค่าพื้นฐาน */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #070707; /* ดำสนิท */
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background-image: radial-gradient(circle at 50% 50%, #112211 0%, #070707 70%); /* แสงเขียวจางๆ พื้นหลัง */
        }

        /* ส่วนหัวเว็ปไซค์ */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: #00ff66; /* เขียว นีออน */
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.5), 0 0 30px rgba(0, 255, 102, 0.2);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        header p {
            font-size: 1.1rem;
            color: #888888;
            letter-spacing: 4px;
        }

        /* กล่องรวมเครื่องเล่นเพลง */
        .player-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 1200px;
            width: 100%;
        }

        /* การ์ดเพลงแต่ละเพลง */
        .music-card {
            background: linear-gradient(145deg, #121212, #1a1a1a);
            border: 1px solid #222222;
            border-radius: 20px;
            padding: 30px;
            width: 320px;
            text-align: left;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        /* ลูกเล่นเวลาเอาเมาส์ไปชี้ (Hover) */
        .music-card:hover {
            transform: translateY(-10px);
            border-color: #00ff66;
            box-shadow: 0 15px 30px rgba(0, 255, 102, 0.2);
        }

        .music-card h2 {
            font-size: 1.4rem;
            margin-bottom: 15px;
            color: #ffffff;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.3s;
        }

        .music-card:hover h2 {
            color: #00ff66; /* ชื่อเพลงเปลี่ยนเป็นสีเขียวเมื่อชี้ */
        }

        /* แอนิเมชันคลื่นเสียงดนตรีจำลอง (Equalizer) */
        .audio-wave {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 20px;
            position: absolute;
            top: 35px;
            right: 30px;
        }

        .audio-wave span {
            width: 3px;
            background-color: #00ff66;
            border-radius: 2px;
            height: 2px;
            transition: transform 0.5s;
        }

        /* ให้คลื่นเสียงขยับเฉพาะตอนเมาส์ชี้ */
        .music-card:hover .audio-wave span {
            animation: bounce 0.8s ease infinite alternate;
        }
        .music-card:hover .audio-wave span:nth-child(2) { animation-delay: 0.2s; }
        .music-card:hover .audio-wave span:nth-child(3) { animation-delay: 0.4s; }
        .music-card:hover .audio-wave span:nth-child(4) { animation-delay: 0.1s; }

        @keyframes bounce {
            0% { height: 2px; }
            100% { height: 20px; }
        }

        /* ปรับแต่งแถบเปิดเพลงให้เข้ากับธีม */
        audio {
            width: 100%;
            margin-top: 10px;
            border-radius: 50px;
            background-color: #222;
        }

        /* สำหรับหน้าจอโทรศัพท์มือถือ */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .music-card { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <h1>YOUNGSTONEROLIC</h1>
        <p>THIS FOR MY FAN</p>
    </header>

    <div class="player-container">

        <div class="music-card">
            <h2>EVERday thang</h2>
            <div class="audio-wave">
                <span></span><span></span><span></span><span></span>
            </div>
            <audio controls>
                <source src="EVERday thang.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="music-card">
            <h2>Stoner Tour Life</h2>
            <div class="audio-wave">
                <span></span><span></span><span></span><span></span>
            </div>
            <audio controls>
                <source src="Stoner Tour Life.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="music-card">
            <h2>อลเวงจัด</h2>
            <div class="audio-wave">
                <span></span><span></span><span></span><span></span>
            </div>
            <audio controls>
                <source src="อลเวงจัด.mp3" type="audio/mpeg">
            </audio>
        </div>

    </div>

</body>
</html>
